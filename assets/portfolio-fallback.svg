<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1440" role="img" aria-labelledby="title desc">
  <title id="title">Olympus Studio archive item</title>
  <desc id="desc">Black and gold fallback artwork for an Olympus Studio portfolio item.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".26"/>
      <stop offset=".55" stop-color="#17120a"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop stop-color="#ffe082"/>
      <stop offset=".5" stop-color="#d4af37"/>
